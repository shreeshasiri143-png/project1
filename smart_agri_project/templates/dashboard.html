<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('https://wallpaperaccess.com/full/1598226.jpg') no-repeat center/cover;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.container {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    width: 350px;
    margin: 60px auto;
    border-radius: 12px;
    text-align: center;
}

input, select, button {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 6px;
}

button {
    background: green;
    color: white;
    border: none;
}

button:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<div class="container">
<h2>🌱 Smart Agriculture (ML)</h2>

<form action="/predict" method="post">

<input type="number" name="temperature" placeholder="Temperature" required>
<input type="number" name="humidity" placeholder="Humidity" required>
<input type="number" name="moisture" placeholder="Moisture" required>

<select name="soil">
<option>Loamy</option>
<option>Sandy</option>
<option>Clay</option>
<option>Black</option>
<option>Red</option>
</select>

<select name="crop">
<option>Rice</option>
<option>Wheat</option>
<option>Maize</option>
<option>Sugarcane</option>
<option>Cotton</option>
</select>

<input type="number" name="nitrogen" placeholder="Nitrogen" required>
<input type="number" name="potassium" placeholder="Potassium" required>
<input type="number" name="phosphorous" placeholder="Phosphorous" required>

<button type="submit">Predict Fertilizer</button>

</form>

<a href="/view">📊 View Records</a>

</div>

</body>
</html>
